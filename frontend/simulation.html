<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation - ClaimSwift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: rgba(20, 26, 38, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-cyan: #00f0ff;
            --accent-blue: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(11, 15, 23, 0.8);
            border-bottom: 1px solid var(--card-border);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-cyan); }

        /* Main Layout */
        main {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            flex-grow: 1;
            height: calc(100vh - 65px);
        }

        /* Glass Panel */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--card-border);
            border-left: 1px solid var(--card-border);
            padding: 2rem;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        /* Left Controls */
        h2 { font-size: 1.2rem; margin-bottom: 1.5rem; }
        .control-group { margin-bottom: 2rem; }
        .control-group label { display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.8rem; text-transform: uppercase; }

        .btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--card-border);
            padding: 0.8rem;
            width: 100%;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 0.8rem;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn.active { border-color: var(--accent-cyan); background: rgba(0, 240, 255, 0.1); color: var(--accent-cyan); }
        .btn.triggered { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn.risk-btn { background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(59, 130, 246, 0.2)); border-color: var(--accent-cyan); text-align: center; justify-content: center; font-weight: 700; margin-top: 2rem;}
        
        /* Map Container (Center) */
        .map-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #02050a;
        }
        #riskMapCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .map-status-overlay {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(11, 15, 23, 0.9);
            border: 1px solid var(--card-border);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
            z-index: 20;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.green { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-dot.red { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        /* Right Data Cards */
        .data-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .data-card h3 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;}
        .data-card .value { font-size: 2rem; font-weight: 700; color: var(--accent-cyan); }
        
        /* AI Log */
        .log-container {
            margin-top: 2rem;
            background: #000;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.8rem;
            color: #10b981;
        }
        .log-entry { margin-bottom: 0.5rem; }

    </style>
</head>
<body>

    <nav>
        <a href="dashboard.html" class="logo">ClaimSwift</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="simulation.html" class="active">Simulation</a>
            <a href="analytics.html">Analytics</a>
        </div>
    </nav>

    <main>
        <!-- LEFT: Controls -->
        <div class="glass-panel">
            <h2>Simulation Controls</h2>
            
            <div class="control-group">
                <label>1. Population</label>
                <button class="btn sim-btn" onclick="simWorkers(200)">200 Workers <span>›</span></button>
                <button class="btn sim-btn" onclick="simWorkers(500)">500 Workers <span>›</span></button>
                <button class="btn sim-btn" onclick="simWorkers(1000)">1000 Workers <span>›</span></button>
            </div>

            <div class="control-group">
                <label>2. Disruptions</label>
                <button class="btn" id="simRain" onclick="simEvent('rain')">Simulate Heavy Rain</button>
                <button class="btn" id="simReports" onclick="simEvent('reports')">Generate Worker Reports</button>
            </div>

            <button class="btn risk-btn" id="simRisk" onclick="runBackendSimulation()">RUN AI RISK ENGINE</button>

            <!-- Logs -->
            <div class="log-container" id="simLog">
                <div class="log-entry">System ready. Waiting for simulation triggers...</div>
            </div>
        </div>

        <!-- CENTER: Heatmap -->
        <div class="map-container">
            <div class="map-status-overlay" id="mapStatus">
                <span class="status-dot green" id="statusDot"></span>
                <span id="statusText">All zones operational</span>
            </div>
            <canvas id="riskMapCanvas"></canvas>
        </div>

        <!-- RIGHT: Data Cards -->
        <div class="glass-panel">
            <h2>Live Metrics</h2>
            
            <div class="data-card">
                <h3>Active Workers</h3>
                <div class="value" id="metricWorkers">0</div>
            </div>
            <div class="data-card">
                <h3>Disrupted Zones</h3>
                <div class="value" id="metricZones" style="color: var(--danger)">0</div>
            </div>
            <div class="data-card">
                <h3>Claims Triggered</h3>
                <div class="value" id="metricClaims">0</div>
            </div>
            <div class="data-card">
                <h3>Total Payout</h3>
                <div class="value" id="metricPayouts" style="color: var(--success)">₹0</div>
            </div>
            <div class="data-card">
                <h3>Last Risk Score</h3>
                <div class="value" id="metricRisk" style="color: var(--warning)">0.00</div>
            </div>
        </div>
    </main>

    <!-- Import original simulation scripts where map logic resides -->
    <script src="js/riskmap.js"></script>
    <script src="js/simulation.js"></script>

    <script>
        // Override the run backend simulation part to call backend API
        async function runBackendSimulation() {
            const riskBtn = document.getElementById('simRisk');
            riskBtn.classList.add('triggered');
            addSimLog('> 🧠 Routing signals to Backend APIs...');

            // Generate random values as per user requirement
            const rainfall_val = Math.random().toFixed(2);
            const delivery_drop_val = Math.random().toFixed(2);
            const report_val = Math.random().toFixed(2);

            addSimLog(`> Payload: Rainfall=${rainfall_val}, Drops=${delivery_drop_val}, Reports=${report_val}`);

            try {
                // Call Node Backend
                const response = await fetch('http://localhost:5000/api/simulation/event', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rainfall: rainfall_val,
                        delivery_drop: delivery_drop_val,
                        reports: report_val
                    })
                });

                if(response.ok) {
                    const data = await response.json();
                    const score = data.risk_score;
                    document.getElementById('metricRisk').textContent = parseFloat(score).toFixed(2);
                    addSimLog(`> ✅ AI Risk Score computed: ${score}`);
                    
                    // Trigger payout logic
                    finishSimulation(score);
                } else {
                    throw new Error("Backend not responding");
                }
            } catch(error) {
                addSimLog(`> ⚠️ Backend not connected. Mocking AI Response...`);
                const mockScore = (0.4 * rainfall_val + 0.3 * delivery_drop_val + 0.3 * report_val).toFixed(2);
                document.getElementById('metricRisk').textContent = mockScore;
                
                setTimeout(() => finishSimulation(mockScore), 800);
            }
        }

        function finishSimulation(score) {
            const workers = parseInt(document.getElementById('metricWorkers').textContent.replace(/,/g, '')) || 0;
            if(workers === 0) return addSimLog('> No workers active. Aborting payout.');

            // Mock system-wide claim count based on risk score
            const systemClaimCount = Math.floor(workers * (score * 0.5));
            const systemPayout = systemClaimCount * 250; 
            
            // Logged-in user's individual payout
            const userPayout = 250;

            // Update UI
            document.getElementById('metricClaims').textContent = systemClaimCount.toLocaleString();
            document.getElementById('metricPayouts').textContent = `₹${systemPayout.toLocaleString()}`;

            addSimLog(`> ✅ ${systemClaimCount} Parametric Claims Automated globally.`);
            addSimLog(`> ↗️ ₹${systemPayout.toLocaleString()} total disbursed across active workers.`);
            
            // UPDATE: Credit User Wallet only for their individual portion
            const userId = localStorage.getItem("userId");
            if(userId) {
                fetch('http://localhost:5000/api/wallet/credit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        amount: userPayout,
                        reason: 'Simulation AI Risk Payout'
                    })
                }).then(res => {
                    if(res.ok) {
                        addSimLog(`> 💰 ₹${userPayout} successfully credited to your personal wallet.`);
                    }
                }).catch(e => {
                    addSimLog(`> ⚠️ Failed to credit your wallet API.`);
                });
            }
        }

        function addSimLog(msg) {
            const logEl = document.getElementById('simLog');
            if(logEl) {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const ts = new Date().toLocaleTimeString();
                entry.textContent = `[${ts}] ${msg}`;
                logEl.appendChild(entry);
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        // Initialize empty state globally on load
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof setMapState === 'function') setMapState('normal');
        });
    </script>
</body>
</html>
