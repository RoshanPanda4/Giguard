<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - ClaimSwift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: rgba(20, 26, 38, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-cyan: #00f0ff;
            --accent-blue: #3b82f6;
            --success: #10b981;
            --grad-accent: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(11, 15, 23, 0.8);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--grad-accent);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-cyan); }

        main {
            padding: 2.5rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 { margin-bottom: 2rem; }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .kpi-card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .kpi-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media(max-width: 900px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            height: 400px;
        }

        .chart-container h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

    </style>
</head>
<body>

    <nav>
        <a href="dashboard.html" class="logo">ClaimSwift</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="simulation.html">Simulation</a>
            <a href="analytics.html" class="active">Analytics</a>
        </div>
    </nav>

    <main>
        <h1>Platform Analytics</h1>

        <div class="kpi-grid">
            <div class="kpi-card">
                <h3>Total Workers</h3>
                <div class="value">4,521</div>
            </div>
            <div class="kpi-card">
                <h3>Active Policies</h3>
                <div class="value">3,890</div>
            </div>
            <div class="kpi-card">
                <h3>Total Claims</h3>
                <div class="value">845</div>
            </div>
            <div class="kpi-card">
                <h3>Total Payout</h3>
                <div class="value" style="color: var(--success)">₹2.1M</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>Claims Per Zone</h3>
                <canvas id="claimsZoneChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Payout Trends (Last 7 Days)</h3>
                <canvas id="payoutTrendChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Chart Config
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('http://localhost:5000/api/analytics');
                if (res.ok) {
                    const data = await res.json();
                    
                    // Update KPI Cards
                    const kpiValues = document.querySelectorAll('.kpi-card .value');
                    if(kpiValues.length >= 4) {
                        kpiValues[0].textContent = data.totalWorkers.toLocaleString();
                        kpiValues[1].textContent = data.activePolicies.toLocaleString();
                        kpiValues[2].textContent = data.totalClaims.toLocaleString();
                        
                        // Format Payout
                        let payoutFmt = '₹' + data.totalPayout.toLocaleString();
                        if (data.totalPayout >= 1000000) {
                            payoutFmt = '₹' + (data.totalPayout / 1000000).toFixed(1) + 'M';
                        }
                        kpiValues[3].textContent = payoutFmt;
                    }
                    
                    // Claims Per Zone (Doughnut)
                    const ctxZone = document.getElementById('claimsZoneChart').getContext('2d');
                    new Chart(ctxZone, {
                        type: 'doughnut',
                        data: {
                            labels: data.charts.zonesLabels || ['Patia', 'KIIT', 'Khandagiri', 'Saheed Nagar'],
                            datasets: [{
                                data: data.charts.zonesData || [0, 0, 0, 0],
                                backgroundColor: [
                                    'rgba(0, 240, 255, 0.8)',
                                    'rgba(59, 130, 246, 0.8)',
                                    'rgba(16, 185, 129, 0.8)',
                                    'rgba(245, 158, 11, 0.8)'
                                ],
                                borderColor: 'rgba(20, 26, 38, 1)',
                                borderWidth: 2
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });

                    // Payout Trends (Bar)
                    const ctxTrend = document.getElementById('payoutTrendChart').getContext('2d');
                    const gradient = ctxTrend.createLinearGradient(0, 0, 0, 400);
                    gradient.addColorStop(0, 'rgba(0, 240, 255, 0.8)');
                    gradient.addColorStop(1, 'rgba(59, 130, 246, 0.2)');

                    new Chart(ctxTrend, {
                        type: 'bar',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                            datasets: [{
                                label: 'Payout Amount (₹)',
                                data: data.charts.payoutTrends || [0,0,0,0,0,0,0],
                                backgroundColor: gradient,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                                x: { grid: { display: false } }
                            }
                        }
                    });
                }
            } catch (err) {
                console.error("Failed to fetch analytics:", err);
            }
        });
    </script>
</body>
</html>
