<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - GigGuard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<nav>
    <h2>GigGuard</h2>
    <button id="logoutBtn">Logout</button>
</nav>

<main>

    <!-- PROFILE -->
    <section class="profile-card">
        <img id="profileImage" src="https://via.placeholder.com/120" alt="Profile">

        <input type="file" id="photoInput" hidden>
        <button id="uploadBtn">Upload Photo</button>

        <h2 id="userName">User</h2>
    </section>

    <!-- POLICY -->
    <section class="card">
        <h3>Policy</h3>
        <p id="policyStatus">Loading...</p>
        <p id="policyCoverage"></p>
        <p id="policyPremium"></p>
    </section>

    <!-- WALLET -->
    <section class="card">
        <h3>Wallet</h3>
        <h2 id="walletBalance">₹0</h2>
    </section>

    <!-- HISTORY -->
    <section class="card">
        <h3>History</h3>
        <div id="historyList"></div>
    </section>

</main>

<script src="js/dashboard.js"></script>
</body>
</html>
